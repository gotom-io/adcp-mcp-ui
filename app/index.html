<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goTom AdCP - Console</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #030712;
      --bg-panel: #1e222d;
      --bg-input: #111827;
      --accent-primary: #00a882;
      --accent-hover: #009375;
      --accent-active: #006d59;
      --text-main: #ffffff;
      --text-muted: #9ca3af;
      --border-color: #374151;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'Fira Code', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-sans);
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* Sidebar (CI/CD Configuration style) */
    .sidebar {
      width: 280px;
      background-color: var(--bg-panel);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
    }
    .brand::before {
      content: '';
      display: block;
      width: 12px;
      height: 12px;
      background: var(--accent-primary);
      border-radius: 2px;
      box-shadow: 0 0 10px var(--accent-primary);
    }

    .config-group {
      margin-bottom: 1.5rem;
    }
    
    .config-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.75rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      border-color: var(--accent-primary);
    }

    /* Main Chat Area */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-dark);
      position: relative;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 1rem;
      line-height: 1.6;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user .message-content {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      max-width: 80%;
    }

    .assistant .message-content {
      background-color: transparent;
      color: var(--text-main);
      width: 100%;
    }

    /* Markdown Styles */
    .markdown-body p { margin-bottom: 1rem; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body code {
      background: var(--bg-input);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.85em;
      color: var(--accent-primary);
    }
    .markdown-body pre {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1rem 0;
    }
    .markdown-body pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      border-radius: 0;
    }
    .markdown-body ul, .markdown-body ol {
      margin-bottom: 1rem;
      padding-left: 2rem;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
      color: var(--text-main);
    }
    .markdown-body h1:first-child, .markdown-body h2:first-child, .markdown-body h3:first-child {
      margin-top: 0;
    }
    .markdown-body a {
      color: var(--accent-primary);
      text-decoration: none;
    }
    .markdown-body a:hover {
      text-decoration: underline;
    }
    .markdown-body blockquote {
      border-left: 4px solid var(--accent-primary);
      padding-left: 1rem;
      margin-left: 0;
      margin-bottom: 1rem;
      color: var(--text-muted);
    }

    /* Input Area */
    .input-wrapper {
      padding: 1.5rem 2rem;
      background: linear-gradient(to top, var(--bg-dark) 80%, transparent);
    }

    .input-box {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      background-color: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      padding: 0.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 1px var(--accent-primary);
    }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-main);
      padding: 0.75rem;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 200px;
      min-height: 44px;
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--accent-primary);
      color: var(--text-main);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 0.25rem;
      transition: background 0.2s;
    }
    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    .send-btn:disabled {
      background: var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Status indicator */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border-color);
      z-index: 10;
    }
    .status-bar .progress {
      height: 100%;
      background: var(--accent-primary);
      width: 0%;
      transition: width 0.3s ease;
    }
    .status-bar.loading .progress {
      width: 100%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    
    .error-toast {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid #dc2626;
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin: 1rem auto;
      max-width: 800px;
      font-size: 0.85rem;
      font-family: var(--font-mono);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">goTom AdCP</div>
      
      <div class="config-group">
        <label for="auth">Authorization / API Key</label>
        <input type="password" id="auth" class="input-field" v-model="authToken" @input="saveCookie" placeholder="sk-...">
      </div>
      
      <div style="margin-top: auto; font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-mono);">
        System Status: <span style="color: #10b981;">● Online</span><br>
        v1.0.0-rc.4
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-area">
      <div class="status-bar" :class="{ loading: loading }">
        <div class="progress"></div>
      </div>

      <div class="chat-container" ref="chatContainer">
        <!-- Welcome Message -->
        <div class="message assistant" v-if="messages.length === 0">
          <div class="message-content" style="color: var(--text-muted); text-align: center; margin-top: 10vh;">
            <svg style="width: 48px; height: 48px; opacity: 0.5; margin-bottom: 1rem; fill: var(--text-muted);" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h-2v5H6v2h2v5h2v-5h2v-2zM19 19H5V5h14v14z"/></svg>
            <h2>AdCP Console Ready</h2>
            <p style="margin-top: 0.5rem; font-size: 0.85rem;">Enter your prompt below to initiate the process.</p>
          </div>
        </div>

        <!-- Chat Messages -->
        <div class="message" v-for="(msg, index) in messages" :key="index" :class="msg.role">
          <div class="message-content" v-if="msg.role === 'user'">{{ msg.content }}</div>
          <div class="message-content markdown-body" v-else v-html="renderMarkdown(msg.content)"></div>
        </div>
        
        <!-- Error Toast -->
        <div class="error-toast" v-if="error">
          <strong>ERR_EXEC:</strong> {{ error }}
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-wrapper">
        <div class="input-box">
          <textarea 
            class="chat-input" 
            v-model="promptInput" 
            @keydown.enter.prevent="submit"
            rows="1" 
            placeholder="Initialize command sequence..."
            ref="inputArea"
            @input="adjustTextareaHeight"
          ></textarea>
          <button class="send-btn" @click="submit" :disabled="loading || !promptInput || !authToken">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, onMounted, nextTick } = Vue;

    createApp({
      setup() {
        const authToken = ref('');
        const promptInput = ref('');
        const messages = ref([]);
        const error = ref('');
        const loading = ref(false);
        const chatContainer = ref(null);
        const inputArea = ref(null);

        const getCookie = (name) => {
          const value = `; ${document.cookie}`;
          const parts = value.split(`; ${name}=`);
          if (parts.length === 2) return parts.pop().split(';').shift();
          return '';
        };

        const saveCookie = () => {
          document.cookie = `adcp_auth=${authToken.value}; path=/; max-age=31536000`;
        };

        onMounted(() => {
          authToken.value = getCookie('adcp_auth');
        });

        const scrollToBottom = async () => {
          await nextTick();
          if (chatContainer.value) {
            chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
          }
        };

        const adjustTextareaHeight = () => {
          const el = inputArea.value;
          if (el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
          }
        };

        const renderMarkdown = (text) => {
          if (!text) return '';
          // marked.parse handles Markdown to HTML conversion
          return marked.parse(text);
        };

        const submit = async () => {
          const text = promptInput.value.trim();
          if (!authToken.value || !text || loading.value) return;
          
          // Add user message
          messages.value.push({ role: 'user', content: text });
          promptInput.value = '';
          adjustTextareaHeight();
          error.value = '';
          loading.value = true;
          scrollToBottom();
          
          // Add empty assistant message placeholder
          const assistantMsgIndex = messages.value.length;
          messages.value.push({ role: 'assistant', content: '' });

          try {
            const res = await fetch('/api/chat', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-adcp-auth': authToken.value
              },
              body: JSON.stringify({ prompt: text })
            });

            if (!res.ok) {
              const errText = await res.text();
              try {
                const json = JSON.parse(errText);
                throw new Error(json.error || `Request failed with status ${res.status}`);
              } catch (e) {
                throw new Error(errText || `Request failed with status ${res.status}`);
              }
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              
              const chunk = decoder.decode(value, { stream: true });
              const lines = chunk.split('\n').filter(Boolean);
              
              for (const line of lines) {
                try {
                  const data = JSON.parse(line);
                  if (data.type === 'text-delta') {
                    messages.value[assistantMsgIndex].content += data.text;
                    scrollToBottom();
                  } else if (data.type === 'error') {
                    error.value = data.error;
                    scrollToBottom();
                  }
                } catch (e) {
                  // Partial chunk or parse error, ignore or handle gracefully
                }
              }
            }
          } catch (err) {
            error.value = err.message;
            // Remove empty assistant message if it failed immediately
            if (!messages.value[assistantMsgIndex].content) {
              messages.value.pop();
            }
            scrollToBottom();
          } finally {
            loading.value = false;
          }
        };

        return { 
          authToken, 
          promptInput, 
          messages, 
          error, 
          loading, 
          saveCookie, 
          submit,
          chatContainer,
          inputArea,
          adjustTextareaHeight,
          renderMarkdown
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
