<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goTom AdCP - Console</title>
  <link rel='apple-touch-icon' sizes='57x57' href='https://gotom.io/favicons/apple-icon-57x57.png'>
  <link rel='apple-touch-icon' sizes='60x60' href='https://gotom.io/favicons/apple-icon-60x60.png'>
  <link rel='apple-touch-icon' sizes='72x72' href='https://gotom.io/favicons/apple-icon-72x72.png'>
  <link rel='apple-touch-icon' sizes='76x76' href='https://gotom.io/favicons/apple-icon-76x76.png'>
  <link rel='apple-touch-icon' sizes='114x114' href='https://gotom.io/favicons/apple-icon-114x114.png'>
  <link rel='apple-touch-icon' sizes='120x120' href='https://gotom.io/favicons/apple-icon-120x120.png'>
  <link rel='apple-touch-icon' sizes='144x144' href='https://gotom.io/favicons/apple-icon-144x144.png'>
  <link rel='apple-touch-icon' sizes='152x152' href='https://gotom.io/favicons/apple-icon-152x152.png'>
  <link rel='apple-touch-icon' sizes='180x180' href='https://gotom.io/favicons/apple-icon-180x180.png'>
  <link rel='icon' type='image/png' sizes='192x192' href='https://gotom.io/favicons/android-icon-192x192.png'>
  <link rel='icon' type='image/png' sizes='16x16' href='https://gotom.io/favicons/favicon-16x16.png'>
  <link rel='icon' type='image/png' sizes='32x32' href='https://gotom.io/favicons/favicon-32x32.png'>
  <link rel='icon' type='image/png' sizes='96x96' href='https://gotom.io/favicons/favicon-96x96.png'>
  <meta name='msapplication-TileColor' content='#00a882'>
  <meta name='msapplication-TileImage' content='https://gotom.io/favicons/ms-icon-144x144.png'>
  <meta name='theme-color' content='#00a882'>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 32 32" fill="#00A882" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 0H0V13.7143H32V0Z"/>
            <path d="M13.7143 18.2857H0V32H13.7143V18.2857Z"/>
            <path d="M32 18.2857H18.2857V32H32V18.2857Z"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">goTom</span>
          <span class="brand-subtitle">AdCP Console</span>
        </div>
      </div>
      
      <div class="config-section">
        <div class="config-section-title">Configuration</div>
        
        <div class="config-group">
          <label for="server">MCP Server</label>
          <select id="server" class="input-field" v-model="mcpServer" @change="saveServerCookie">
            <option value="https://dev-demo-mcp.gotom.io">Dev Demo</option>
          </select>
        </div>

        <div class="config-group">
          <label for="model">AI Model</label>
          <select id="model" class="input-field" v-model="aiModel" @change="saveModelCookie">
            <option value="anthropic:claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="anthropic:claude-opus-4-5">Claude Opus 4.5</option>
            <option value="openai:gpt-4.1">GPT-4.1</option>
          </select>
        </div>

        <div class="config-group">
          <label for="auth">API Key</label>
          <input type="password" id="auth" class="input-field" v-model="authToken" @input="saveCookie" placeholder="Enter your API key...">
        </div>
      </div>
      
      <div class="sidebar-footer">
        <button class="clear-btn" @click="clearHistory" :disabled="loading">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          </svg>
          Clear Context History
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-area">
      <div class="progress-bar" :class="{ loading: loading }">
        <div class="progress"></div>
      </div>

      <div class="chat-container" ref="chatContainer">
        <!-- Welcome Screen -->
        <div class="welcome-screen" v-if="messages.length === 0">
          <div class="welcome-icon">
            <svg viewBox="0 0 32 32" fill="#00A882" xmlns="http://www.w3.org/2000/svg">
              <path d="M32 0H0V13.7143H32V0Z"/>
              <path d="M13.7143 18.2857H0V32H13.7143V18.2857Z"/>
              <path d="M32 18.2857H18.2857V32H32V18.2857Z"/>
            </svg>
          </div>
          <h1 class="welcome-title">AdCP Console Ready</h1>
          <p class="welcome-subtitle">
            Your AI-powered interface for managing advertising campaigns and data operations.
          </p>
          <div class="welcome-hint">
            Press <code>Enter</code> to send, <code>Shift+Enter</code> for new line
          </div>
        </div>

        <!-- Chat Messages -->
        <div class="message" v-for="(msg, index) in messages" :key="index" :class="msg.role">
          <!-- User message -->
          <div class="message-content" v-if="msg.role === 'user'">{{ msg.content }}</div>
          <!-- Warning message (context truncated) -->
          <div class="message-content warning-message" v-else-if="msg.role === 'warning'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <span>{{ msg.content }}</span>
          </div>
          <!-- Assistant message -->
          <div class="message-content markdown-body" v-else>
            <div v-if="msg.content" v-html="renderMarkdown(msg.content)"></div>
          </div>
        </div>

        <!-- Thinking Indicator -->
        <div class="thinking-indicator-wrapper" v-if="loading">
          <div class="loading-indicator">
            <div class="loading-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span>Thinking...</span>
          </div>
        </div>

        <!-- Error Toast -->
        <div class="error-toast" v-if="error">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span>{{ error }}</span>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-wrapper">
        <div class="input-box">
          <textarea 
            class="chat-input" 
            v-model="promptInput" 
            @keydown="handleKeydown"
            rows="1" 
            placeholder="Ask me anything about your campaigns..."
            ref="inputArea"
            @input="adjustTextareaHeight"
          ></textarea>
          <button class="send-btn" @click="submit" :disabled="loading || !promptInput || !authToken">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
